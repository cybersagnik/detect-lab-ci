name: DetectLab CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  detect-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sigma-cli and backends
        run: |
          pip install sigma-cli \
            pySigma-backend-splunk \
            pySigma-backend-microsoft365defender \
            pySigma-pipeline-sysmon

      - name: Verify available targets and pipelines
        run: |
          echo "=== sigma-cli version ==="
          sigma version
          echo ""
          echo "=== Available targets ==="
          sigma list targets
          echo ""
          echo "=== Available pipelines ==="
          sigma list pipelines

      - name: Lint all Sigma rules
        run: |
          echo "=== Linting rules ==="
          sigma check sigma-rules/windows/**/*.yml
          echo "All rules passed lint"

      - name: Run EVTX test runner
        run: |
          pip install python-evtx pyyaml
          python tests/test_runner.py

      - name: Convert to KQL (Microsoft Sentinel)
        run: |
          mkdir -p converted/kql
          FAILED=0
          for f in $(find sigma-rules/windows -name "*.yml" | sort); do
            out="converted/kql/${f#sigma-rules/}"
            out="${out%.yml}.txt"
            mkdir -p "$(dirname $out)"
            if sigma convert \
                -t kusto \
                -p sysmon \
                "$f" > "$out" 2>&1; then
              echo "✓ KQL OK  →  $f"
            else
              echo "✗ KQL FAIL → $f"
              cat "$out"
              FAILED=1
            fi
          done
          [ $FAILED -ne 0 ] && exit 1
          echo "All rules converted to KQL"

      - name: Convert to SPL (Splunk)
        run: |
          mkdir -p converted/spl
          FAILED=0
          for f in $(find sigma-rules/windows -name "*.yml" | sort); do
            out="converted/spl/${f#sigma-rules/}"
            out="${out%.yml}.txt"
            mkdir -p "$(dirname $out)"
            if sigma convert \
                -t splunk \
                -p sysmon \
                "$f" > "$out" 2>&1; then
              echo "✓ SPL OK  →  $f"
            else
              echo "✗ SPL FAIL → $f"
              cat "$out"
              FAILED=1
            fi
          done
          [ $FAILED -ne 0 ] && exit 1
          echo "All rules converted to SPL"

      - name: List all converted files
        run: |
          echo "=== KQL files ==="
          find converted/kql -type f | sort
          echo ""
          echo "=== SPL files ==="
          find converted/spl -type f | sort
          echo ""
          echo "Total: $(find converted/ -type f | wc -l) files generated"

      - name: Commit converted queries to repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add converted/
          if git diff --staged --quiet; then
            echo "No changes to converted files — skipping commit"
          else
            git commit -m "ci: auto-update converted KQL and SPL queries [skip ci]

            Generated from Sigma rules on push to master.
            Do not edit these files manually — they are auto-generated."
            git push origin master
          fi

      - name: Upload converted queries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-queries-${{ github.sha }}
          path: converted/
          if-no-files-found: error