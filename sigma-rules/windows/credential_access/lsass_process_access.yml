title: LSASS Memory Access Indicating Credential Dumping
id: c6f2a9d5-8e4b-4c1f-b7a2-3d9e5f8c1b4a
status: test
description: >
  Detects process access to lsass.exe with access masks associated with
  credential dumping. Filters on GrantedAccess masks rather than
  SourceImage to avoid blindly trusting process names that can be
  spoofed or injected. Only wininit.exe is filtered by process name
  as it holds a legitimate permanent handle to LSASS at boot and
  cannot be spawned by user-level processes.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.001/T1003.001.md
author: Sagnik Ray
date: 2025/07/01
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'    
      - '0x1438'    
      - '0x143a'    
      - '0x1fffff'  
      - '0x40'    
  filter_wininit:
    SourceImage|endswith: '\wininit.exe'
  condition: selection and not filter_wininit
falsepositives:
  - Security software opening LSASS with these specific masks (rare)
  - Investigate SourceImage and parent process before closing alert
level: critical
tags:
  - attack.credential_access
  - attack.t1003.001
