title: Suspicious Scheduled Task Creation via schtasks.exe
id: b3e9f1a4-7c2d-4b8e-a5f3-9e1c6d8b2a7f
status: test
description: >
  Detects suspicious scheduled task creation using schtasks.exe where
  the task runs from user-writable locations or spawns interpreter
  processes. Broad strings (http, AppData) removed due to high FP rate
  against unrelated Sysmon network and file events.
references:
  - https://attack.mitre.org/techniques/T1053/005/
author: Sagnik Ray
date: 2025/07/01
logsource:
  category: process_creation
  product: windows
detection:
  selection_base:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains|all:
      - '/Create'
      - '/TR'
  selection_suspicious:
    CommandLine|contains:
      - 'powershell'
      - 'cmd.exe'
      - 'wscript'
      - 'cscript'
      - 'mshta'
      - 'regsvr32'
      - '\Temp\'
      - '\AppData\Local\Temp'
      - '\AppData\Roaming'
  filter_safe:
    CommandLine|contains:
      - '/TR "C:\Windows\'
      - '/TR "C:\Program Files\'
      - '/TR "C:\Program Files (x86)\'
  condition: selection_base and (selection_suspicious or not filter_safe)
falsepositives:
  - Legitimate admin scripts scheduling PowerShell maintenance tasks
  - Review CommandLine and scheduled task name before escalating
level: medium
tags:
  - attack.persistence
  - attack.t1053.005